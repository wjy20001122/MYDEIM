__include__: [
  '../dataset/pest_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml'
]
#siman
output_dir: ./outputs/deimv2_hgnetv2_pico_pest_bifpn_eca4

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True
  use_simam_stages: [1, 2, 3]
  use_sppcspc_stage: -1

DEIM:
  backbone: HGNetv2
  encoder: LiteEncoderBiFPN
  decoder: DEIMTransformer

LiteEncoderBiFPN:
  in_channels: [256, 512, 1024]
  feat_strides: [8, 16, 32]
  hidden_dim: 112
  num_outputs: 3
  output_strides: [8, 16, 32]
  use_attention: 'eca'
  use_global_fusion: True
  expansion: 0.34
  depth_mult: 0.5
  act: 'silu'

DEIMTransformer:
  feat_channels: [112, 112, 112]
  feat_strides: [8, 16, 32]
  hidden_dim: 112
  num_levels: 3
  num_points: [4, 2, 1]
  nhead: 8

  num_layers: 3
  eval_idx: -1
  num_queries: 300

  dim_feedforward: 320
  share_bbox_head: True
  use_gateway: False

epoches: 200

warmup_iter: 1500
flat_epoch: 150
no_aug_epoch: 20
lr_gamma: 0.5

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0008
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0008
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0016
  betas: [0.9, 0.999]
  weight_decay: 0.0001

eval_spatial_size: [640, 640]

train_dataloader: 
  total_batch_size: 16
  dataset: 
    transforms:
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 4}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 4}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 125, 150]
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.5

  collate_fn:
    mixup_prob: 0.1
    mixup_epochs: [4, 60]
    copyblend_prob: 0.05
    copyblend_epochs: [4, 60]
    stop_epoch: 170
    ema_restart_decay: 0.9999
    base_size: 640
    base_size_repeat: ~

val_dataloader:
  total_batch_size: 32
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False
  num_workers: 12

DEIMCriterion:
  weight_dict: {loss_mal: 1.0, loss_bbox: 5.0, loss_giou: 2.0, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['mal', 'boxes']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2.0, cost_bbox: 5.0, cost_giou: 2.0}
    alpha: 0.25
    gamma: 2.0
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 170
